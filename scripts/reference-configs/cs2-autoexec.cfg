// ============================================================
// CS2 Reference Config - Valid Competitive Commands
// Format: Source 2 CFG (command value, one per line)
// Path: <Steam>\steamapps\common\Counter-Strike Global Offensive\game\csgo\cfg\autoexec.cfg
// Last verified: March 2026
//
// Sources:
//   - Valve September 13 2023 patch notes (removed legacy convars)
//   - poggu.me CS2 convar dump
//   - ghostcap Counter-Strike-2-Command-List (GitHub)
//   - TotalCS.net command database
//   - GamingCFG.com pro player configs (Donk, s1mple, NiKo)
//   - BLAST.tv pro settings database
// ============================================================

// --- FRAME RATE ---
fps_max 400
fps_max_menu 60
fps_max_ui 120
fps_max_tools 0

// --- NETWORK ---
// rate is the only client-side network convar that still functions in CS2.
// Valve removed cl_interp, cl_interp_ratio, cl_updaterate, cl_cmdrate
// on Sep 13 2023. CS2 sub-tick handles interpolation server-side.
rate 786432
cl_lagcompensation 1

// LEGACY network commands (removed Sep 2023 -- silently ignored by CS2):
cl_updaterate 128
cl_cmdrate 128
cl_interp 0
cl_interp_ratio 1

// --- GRAPHICS ---
r_dynamic 0
r_drawtracers_firstperson 1
mat_monitorgamma 2.2
engine_no_focus_sleep 50
engine_low_latency_sleep_after_client_tick 0

// --- RADAR / HUD ---
cl_radar_always_centered 0
cl_radar_scale 0.4
cl_radar_icon_scale_min 0.6
cl_radar_rotate 1
cl_hud_radar_scale 1.15
cl_hud_background_alpha 0.4
cl_hud_bomb_under_radar 1
cl_hud_playercount_pos 0
cl_hud_playercount_showcount 0
cl_hud_color 0
cl_hud_healthammo_style 0
hud_scaling 1.0
cl_teammate_colors_show 1
cl_showloadout 1
cl_showfps 0
cq_netgraph 0
cq_netgraph_problem_show_auto 0

// --- AUDIO ---
volume 1.0
snd_mixahead 0.05
snd_musicvolume 0.0
snd_tensecondwarning_volume 0.3
snd_headphone_pan_exponent 1
snd_front_headphone_position 45
snd_rear_headphone_position 135
snd_ducking_off 0
voice_scale 1.0
voice_enable 1

// --- MOUSE ---
sensitivity 2.0
zoom_sensitivity_ratio_mouse 1.0
m_pitch 0.022
m_yaw 0.022
m_customaccel 0
mouse_inverty 0

// LEGACY mouse commands (removed in CS2 -- silently ignored):
m_rawinput 1
m_mouseaccel1 0
m_mouseaccel2 0

// --- CROSSHAIR ---
cl_crosshairstyle 4
cl_crosshairsize 2
cl_crosshairthickness 1
cl_crosshairgap -1
cl_crosshairdot 0
cl_crosshairalpha 255
cl_crosshaircolor 5
cl_crosshaircolor_r 0
cl_crosshaircolor_g 255
cl_crosshaircolor_b 0
cl_crosshair_drawoutline 0
cl_crosshair_outlinethickness 1
cl_crosshair_t 0
cl_crosshairusealpha 1
cl_crosshair_recoil 0
cl_crosshair_sniper_width 1

// --- VIEWMODEL ---
viewmodel_fov 68
viewmodel_offset_x 0
viewmodel_offset_y 0
viewmodel_offset_z 0
viewmodel_presetpos 1
viewmodel_recoil 1
cl_righthand 1

// --- VIEWMODEL BOB ---
cl_bob_lower_amt 21
cl_bobamt_lat 0.4
cl_bobamt_vert 0.25
cl_bobcycle 0.98
cl_viewmodel_shift_left_amt 1.5
cl_viewmodel_shift_right_amt 0.75

// --- GAME ---
cl_show_team_equipment 0
cl_use_opens_buy_menu 0
