// ============================================================
// Dota 2 Reference Config - Valid Competitive Commands
// Format: Source 2 CFG (command value, one per line)
// Path: <Steam>\steamapps\common\dota 2 beta\game\dota\cfg\autoexec.cfg
// Last verified: March 2026
//
// Sources:
//   - Valve Dota 2 Source 2 engine ConVar reference
//   - Community competitive configs (Reddit r/DotA2, Liquipedia)
//   - Pro player settings databases
