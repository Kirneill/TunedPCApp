// --- FPS & PERFORMANCE ---
fps_max 0
engine_no_focus_sleep 0
r_dynamic_lod 1
r_lod_switch_scale 0.5
dota_cheap_water 1
dota_embers 0
cl_globallight_shadow_mode 0
mat_vsync 0
mat_queue_mode 2

// --- NETWORK (Competitive) ---
rate 786432
cl_cmdrate 60
cl_updaterate 60
cl_interp 0
cl_interp_ratio 1
cl_lagcompensation 1
cl_smooth 1
cl_smoothtime 0.01

// --- VISUAL CLUTTER REDUCTION ---
dota_hud_healthbar_number 1
dota_sf_game_end_delay 0
dota_disable_range_finder 0
