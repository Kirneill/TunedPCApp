; Marvel Rivals -- Reference Config (Competitive Mid-Range Preset -- NVIDIA RTX variant)
; AMD/Intel values differ: AntiAliasingSuperSamplingMode=3 (FSR), bNvidiaReflex=False
; Game version: Season 4/5 (UE5, NetEase)
; Config path: %LOCALAPPDATA%\Marvel\Saved\Config\Windows\GameUserSettings.ini
; Note: Set file read-only after writing -- game overwrites on exit
; Source: GitHub Natram1zh/Marvel-Rivals-Config + community verification

[Internationalization]
Culture=en

[ScalabilityGroups]
sg.ResolutionQuality=100
sg.ViewDistanceQuality=1
sg.AntiAliasingQuality=0
sg.PostProcessQuality=0
sg.ShadowQuality=0
sg.GlobalIlluminationQuality=0
sg.ReflectionQuality=0
sg.EffectsQuality=0
sg.FoliageQuality=0
sg.TextureQuality=1
sg.ShadingQuality=0

[/Script/Engine.GameUserSettings]
bUseDesiredScreenHeight=False

[/Script/Marvel.MarvelGameUserSettings]
bUseVSync=False
bUseDynamicResolution=False
FullscreenMode=0
LastConfirmedFullscreenMode=0
PreferredFullscreenMode=0
FrameRateLimit=0.000000
ResolutionSizeX=1920
ResolutionSizeY=1080
LastUserConfirmedResolutionSizeX=1920
LastUserConfirmedResolutionSizeY=1080
DesiredScreenWidth=1920
DesiredScreenHeight=1080
; AntiAliasingSuperSamplingMode: 0=Off, 1=TAAU, 2=DLSS(RTX), 3=FSR(Any), 4=TSR(Epic), 5=XeSS(Arc)
AntiAliasingSuperSamplingMode=2
; SuperSamplingQuality: 0=UltraPerf, 1=Perf, 2=Balanced, 3=Quality, 4=UltraQuality
SuperSamplingQuality=3
CASSharpness=1.000000
bNvidiaReflex=True
bXeLowLatency=False
bDlssFrameGeneration=False
bFSRFrameGeneration=False
bXeFrameGeneration=False
MonitorIndex=0
bEnableConsole120Fps=False
bUseHDRDisplayOutput=False
HDRDisplayOutputNits=1000
AudioQualityLevel=0
VoiceLanguage=
