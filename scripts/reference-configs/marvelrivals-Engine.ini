; Marvel Rivals -- Engine.ini Competitive Overrides
; Path: %LOCALAPPDATA%\Marvel\Saved\Config\Windows\Engine.ini
; Note: Game does NOT rewrite Engine.ini on exit; script does not set read-only
; Note: NetEase may silently ignore some CVars via server-side blacklist -- test individually

[SystemSettings]
; Shadow quality enforcement (reinforces sg.ShadowQuality=0)
r.Shadow.MaxResolution=512
r.Shadow.MaxCSMResolution=512
r.Shadow.CSM.MaxCascades=1
r.ContactShadows=0

; Volumetric/atmospheric effects -- major visual clutter on outdoor maps
r.VolumetricFog=0
r.VolumetricCloud=0
r.LightShaftBloom=0

; Eye adaptation causes visibility swings entering/exiting bright areas
r.EyeAdaptationQuality=0

; Screen-space reflections (already off via sg.ReflectionQuality=0 but enforce here)
r.SSR.Quality=0

; Ambient occlusion
r.AmbientOcclusionLevels=0

[/Script/Engine.RendererSettings]
; Post-processing clutter removal
r.MotionBlurQuality=0
r.DepthOfFieldQuality=0
r.BloomQuality=0
r.LensFlareQuality=0
r.FilmGrain=0
r.Tonemapper.Sharpen=0

; Chromatic aberration (purple/cyan screen-edge fringing)
r.SceneColorFringeQuality=0

[/Script/Engine.InputSettings]
; Raw mouse input -- disable smoothing and acceleration
bEnableMouseSmoothing=False
bViewAccelerationEnabled=False
