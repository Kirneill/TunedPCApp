<?xml version="1.0" encoding="utf-8"?>
<Playbook>
    <Name>TUNEDPC Lightweight OS</Name>
    <Username>TUNEDPC</Username>
    <Title>TUNEDPC Lightweight OS v1.0</Title>
    <ShortDescription>Make Windows ultra-lightweight for competitive gaming</ShortDescription>
    <Description>TUNEDPC Lightweight OS strips Windows down to the essentials for maximum gaming performance. Removes telemetry, bloatware, unnecessary services, and WinSxS components while preserving anti-cheat compatibility (Vanguard, RICOCHET, EAC, BattlEye).</Description>
    <Version>1.0.0</Version>
    <UniqueId>d4e7b2a1-3c5f-4a8e-9d12-6f0b3e8c71a4</UniqueId>
    <Details>Optimized for competitive FPS gaming. Safe for Valorant, COD, Fortnite, CS2, Tarkov.</Details>
    <EstimatedMinutes>15</EstimatedMinutes>
    <Overhaul>false</Overhaul>
    <ProductCode>64</ProductCode>
    <Git>https://github.com/Kirneill/TunedPCApp</Git>
    <DonateLink>https://sensequality.com</DonateLink>
    <Website>https://sensequality.com</Website>
    <Requirements>
        <Requirement>DefenderToggled</Requirement>
        <Requirement>Internet</Requirement>
        <Requirement>NoAntivirus</Requirement>
        <Requirement>NoPendingUpdates</Requirement>
        <Requirement>PluggedIn</Requirement>
    </Requirements>
    <FeaturePages>
        <RadioPage IsRequired="true" DefaultOption="recommended" Description="Choose your optimization level">
            <TopLine Text="Optimization Level"/>
            <Options>
                <RadioOption>
                    <Text>Recommended (Anti-Cheat Safe)</Text>
                    <Name>recommended</Name>
                </RadioOption>
                <RadioOption>
                    <Text>Maximum Performance (May break some anti-cheat)</Text>
                    <Name>maximum</Name>
                </RadioOption>
            </Options>
        </RadioPage>
        <CheckboxPage IsRequired="false" Description="Optional tweaks">
            <TopLine Text="Additional Options"/>
            <Options>
                <CheckboxOption IsChecked="true">
                    <Text>Remove bloatware apps (Cortana, Teams, Clipchamp, etc.)</Text>
                    <Name>remove-bloat</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Disable telemetry and data collection</Text>
                    <Name>disable-telemetry</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Optimize for gaming performance (MMCSS, timer, power plan)</Text>
                    <Name>gaming-perf</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="false">
                    <Text>Remove Windows Defender (NOT recommended for online games)</Text>
                    <Name>remove-defender</Name>
                </CheckboxOption>
                <CheckboxOption IsChecked="true">
                    <Text>Remove unused Windows capabilities (IE, Fax, WordPad, etc.)</Text>
                    <Name>remove-capabilities</Name>
                </CheckboxOption>
            </Options>
        </CheckboxPage>
    </FeaturePages>
</Playbook>
