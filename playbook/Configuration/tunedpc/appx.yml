---
title: AppX Package Removal
description: Remove bloatware UWP apps and deprovision to prevent reinstallation
actions:
  # =====================================================================
  # APPX REMOVAL: Remove bloatware and deprovision
  #
  # PRESERVED (required for gaming ecosystem):
  #   Microsoft.WindowsStore, Microsoft.GamingApp,
  #   Microsoft.XboxIdentityProvider, Microsoft.XboxGamingOverlay,
  #   Microsoft.XboxSpeechToTextOverlay, Microsoft.WindowsTerminal,
  #   Microsoft.WindowsCalculator, Microsoft.DesktopAppInstaller,
  #   Microsoft.StorePurchaseApp, Microsoft.WindowsNotepad,
  #   Microsoft.Paint, Microsoft.ScreenSketch
  #
  # Gated behind "remove-bloat" checkbox option
  # =====================================================================

  # --- Bing Suite ---
  - !appx: {name: '*BingNews*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*BingWeather*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*BingFinance*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*BingSports*', type: family, option: 'remove-bloat'}

  # --- Microsoft Bloatware ---
  - !appx: {name: '*GetHelp*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*Getstarted*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*MicrosoftOfficeHub*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*MicrosoftSolitaireCollection*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*MixedReality.Portal*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*People*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*PowerAutomateDesktop*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*SkypeApp*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*Todos*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*MicrosoftStickyNotes*', type: family, option: 'remove-bloat'}

  # --- Communication and Productivity ---
  - !appx: {name: '*WindowsCommunicationsApps*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*OutlookForWindows*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*MicrosoftTeams*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*MSTeams*', type: family, option: 'remove-bloat'}

  # --- Cortana and Copilot ---
  - !appx: {name: '*549981C3F5F10*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*Copilot*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*Microsoft.Windows.Ai.Copilot.Provider*', type: family, option: 'remove-bloat'}

  # --- Media ---
  - !appx: {name: '*ZuneMusic*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*ZuneVideo*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*WindowsSoundRecorder*', type: family, option: 'remove-bloat'}

  # --- Utilities ---
  - !appx: {name: '*WindowsAlarms*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*WindowsFeedbackHub*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*WindowsMaps*', type: family, option: 'remove-bloat'}

  # --- Phone and Connectivity ---
  - !appx: {name: '*YourPhone*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*PhoneLink*', type: family, option: 'remove-bloat'}

  # --- Third-party Bloatware (OEM and Microsoft bundled) ---
  - !appx: {name: '*Clipchamp*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*QuickAssist*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*Windows.DevHome*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*Family*', type: family, option: 'remove-bloat'}

  # --- Xbox apps (background services, NOT the identity provider) ---
  - !appx: {name: '*Xbox.TCUI*', type: family, option: 'remove-bloat'}
  - !appx: {name: '*XboxApp*', type: family, option: 'remove-bloat'}

  - !powerShell:
      command: 'Stop-Process -Name ''OneDrive'' -Force -ErrorAction SilentlyContinue; $sr = [Environment]::GetEnvironmentVariable(''SystemRoot''); $o64 = Join-Path $sr ''SysWOW64\OneDriveSetup.exe''; $o32 = Join-Path $sr ''System32\OneDriveSetup.exe''; if (Test-Path $o64) { Start-Process $o64 -ArgumentList ''/uninstall'' -Wait -ErrorAction SilentlyContinue } elseif (Test-Path $o32) { Start-Process $o32 -ArgumentList ''/uninstall'' -Wait -ErrorAction SilentlyContinue }; $up = [Environment]::GetFolderPath(''UserProfile''); $la = [Environment]::GetFolderPath(''LocalApplicationData''); $pd = [Environment]::GetEnvironmentVariable(''ProgramData''); Remove-Item (Join-Path $up ''OneDrive'') -Recurse -Force -ErrorAction SilentlyContinue; Remove-Item (Join-Path $la ''Microsoft\OneDrive'') -Recurse -Force -ErrorAction SilentlyContinue; Remove-Item (Join-Path $pd ''Microsoft OneDrive'') -Recurse -Force -ErrorAction SilentlyContinue; Write-Host ''[TUNEDPC] OneDrive removed.'''
      option: 'remove-bloat'
      weight: 3

  - !powerShell:
      command: '$names = @(''Microsoft.BingNews'',''Microsoft.BingWeather'',''Microsoft.BingFinance'',''Microsoft.BingSports'',''Microsoft.GetHelp'',''Microsoft.Getstarted'',''Microsoft.MicrosoftOfficeHub'',''Microsoft.MicrosoftSolitaireCollection'',''Microsoft.MixedReality.Portal'',''Microsoft.People'',''Microsoft.PowerAutomateDesktop'',''Microsoft.SkypeApp'',''Microsoft.Todos'',''Microsoft.MicrosoftStickyNotes'',''Microsoft.WindowsCommunicationsApps'',''Microsoft.OutlookForWindows'',''MicrosoftTeams'',''Microsoft.549981C3F5F10'',''Microsoft.Copilot'',''Microsoft.ZuneMusic'',''Microsoft.ZuneVideo'',''Microsoft.WindowsSoundRecorder'',''Microsoft.WindowsAlarms'',''Microsoft.WindowsFeedbackHub'',''Microsoft.WindowsMaps'',''Microsoft.YourPhone'',''Clipchamp.Clipchamp'',''MicrosoftCorporationII.QuickAssist'',''Microsoft.Windows.DevHome'',''Microsoft.Xbox.TCUI'',''Microsoft.XboxApp''); $d = 0; foreach ($n in $names) { $prov = Get-AppxProvisionedPackage -Online -ErrorAction SilentlyContinue | Where-Object { $_.DisplayName -eq $n }; if ($prov) { foreach ($p in $prov) { try { Remove-AppxProvisionedPackage -Online -PackageName $p.PackageName -ErrorAction Stop | Out-Null; $d++ } catch {} } }; $fn = (Get-AppxPackage -Name $n -AllUsers -ErrorAction SilentlyContinue | Select-Object -First 1).PackageFamilyName; if ($fn) { $dp = ''HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Appx\AppxAllUserStore\Deprovisioned\'' + $fn; if (-not (Test-Path $dp)) { New-Item -Path $dp -Force | Out-Null } } }; Write-Host (''[TUNEDPC] Deprovisioned {0} packages.'' -f $d)'
      option: 'remove-bloat'
      weight: 5

  # --- Additional apps removed in Maximum mode ---
  # Windows Camera -- not needed for FPS gaming
  - !appx: {name: '*WindowsCamera*', type: family, option: 'maximum'}
  # 3D Viewer
  - !appx: {name: '*3DViewer*', type: family, option: 'maximum'}
  # Paint 3D
  - !appx: {name: '*Paint3D*', type: family, option: 'maximum'}
  # OneNote
  - !appx: {name: '*OneNote*', type: family, option: 'maximum'}
  # Disney+ and Spotify (OEM preinstalls)
  - !appx: {name: '*Disney*', type: family, option: 'maximum'}
  - !appx: {name: '*SpotifyAB*', type: family, option: 'maximum'}
