---
title: WinSxS Component and Windows Capability Removal
description: Remove unused Windows capabilities and clean the component store -- the key differentiator over PowerShell-only debloating
actions:
  # =====================================================================
  # COMPONENTS: WinSxS component store manipulation
  #
  # THIS IS THE KEY DIFFERENTIATOR -- TrustedInstaller-level operations
  # that PowerShell alone cannot perform. AME Wizard runs with
  # TrustedInstaller privileges, allowing deep component removal.
  #
  # Gated behind "remove-capabilities" checkbox option
  # =====================================================================

  - !powerShell:
      command: '$px = @(''Browser.InternetExplorer'',''MathRecognizer'',''Microsoft.Windows.PowerShell.ISE'',''App.StepsRecorder'',''Media.WindowsMediaPlayer'',''Microsoft.Windows.WordPad'',''Print.Fax.Scan'',''Hello.Face'',''App.Support.QuickAssist'',''Print.Management.Console'',''SNMP.Client'',''WMIC''); $r = 0; $caps = Get-WindowsCapability -Online -ErrorAction SilentlyContinue | Where-Object { $_.State -eq ''Installed'' }; foreach ($p in $px) { $m = $caps | Where-Object { $_.Name -like ($p + ''*'') }; if ($m) { foreach ($c in $m) { try { Remove-WindowsCapability -Online -Name $c.Name -ErrorAction Stop | Out-Null; $r++; Write-Host (''[TUNEDPC] Removed: '' + $c.Name) } catch { Write-Host (''[TUNEDPC] Skipped: '' + $c.Name) } } } }; Write-Host (''[TUNEDPC] Removed {0} capabilities.'' -f $r)'
      wait: true
      weight: 15
      option: 'remove-capabilities'

  - !powerShell:
      command: '$ft = @(''WorkFolders-Client'',''FaxServicesClientPackage'',''Printing-XPSServices-Features'',''WindowsMediaPlayer'',''Printing-Foundation-InternetPrinting-Client''); $d = 0; foreach ($f in $ft) { $s = Get-WindowsOptionalFeature -Online -FeatureName $f -ErrorAction SilentlyContinue; if ($s -and $s.State -eq ''Enabled'') { try { Disable-WindowsOptionalFeature -Online -FeatureName $f -NoRestart -ErrorAction Stop | Out-Null; $d++; Write-Host (''[TUNEDPC] Disabled: '' + $f) } catch { Write-Host (''[TUNEDPC] Skipped: '' + $f) } } }; Write-Host (''[TUNEDPC] Disabled {0} optional features.'' -f $d)'
      wait: true
      weight: 10
      option: 'remove-capabilities'

  # --- Enable Useful Features ---

  # DirectPlay for legacy game compatibility
  - !cmd:
      command: 'DISM /Online /Enable-Feature /FeatureName:DirectPlay /All /NoRestart'
      wait: true
      weight: 3

  # .NET Framework 3.5 -- skip if Windows Update is unavailable (non-fatal)
  - !powerShell:
      command: '$f = Get-WindowsOptionalFeature -Online -FeatureName ''NetFx3'' -ErrorAction SilentlyContinue; if ($f -and $f.State -ne ''Enabled'') { try { Enable-WindowsOptionalFeature -Online -FeatureName ''NetFx3'' -All -NoRestart -ErrorAction Stop | Out-Null; Write-Host ''[TUNEDPC] .NET 3.5 enabled.'' } catch { Write-Host ''[TUNEDPC] .NET 3.5 skipped (requires Windows Update or install media).'' } } else { Write-Host ''[TUNEDPC] .NET 3.5 already enabled.'' }'
      wait: true
      weight: 5

  # Component store cleanup -- use lightweight cleanup (no /ResetBase to avoid 20+ min hang)
  - !cmd:
      command: 'DISM /Online /Cleanup-Image /StartComponentCleanup /NoRestart'
      wait: true
      weight: 5
      option: 'remove-capabilities'

  # --- Maximum mode: Remove additional Windows Optional Features ---

  # SMB 1.0/CIFS (legacy file sharing -- security risk)
  - !cmd:
      command: 'DISM /Online /Disable-Feature /FeatureName:SMB1Protocol /NoRestart'
      wait: true
      weight: 2
      option: 'maximum'

  # Telnet Client
  - !cmd:
      command: 'DISM /Online /Disable-Feature /FeatureName:TelnetClient /NoRestart'
      wait: true
      weight: 1
      option: 'maximum'

  # TFTP Client
  - !cmd:
      command: 'DISM /Online /Disable-Feature /FeatureName:TFTP /NoRestart'
      wait: true
      weight: 1
      option: 'maximum'

  # Windows Subsystem for Linux (if not needed)
  - !cmd:
      command: 'DISM /Online /Disable-Feature /FeatureName:Microsoft-Windows-Subsystem-Linux /NoRestart'
      wait: true
      weight: 2
      option: 'maximum'
