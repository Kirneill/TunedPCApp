---
title: Final Cleanup
description: Clear temp files, update cache, prefetch, and run disk cleanup
actions:
  # =====================================================================
  # CLEANUP: Final system cleanup after all optimizations
  # =====================================================================

  - !powerShell:
      command: 'Stop-Service -Name ''wuauserv'' -Force -ErrorAction SilentlyContinue; Stop-Service -Name ''BITS'' -Force -ErrorAction SilentlyContinue; $sr = [Environment]::GetEnvironmentVariable(''SystemRoot''); $sd = Join-Path $sr ''SoftwareDistribution\Download''; if (Test-Path $sd) { Remove-Item (Join-Path $sd ''*'') -Recurse -Force -ErrorAction SilentlyContinue; Write-Host ''[TUNEDPC] Windows Update cache cleared.'' }; Start-Service -Name ''BITS'' -ErrorAction SilentlyContinue; Start-Service -Name ''wuauserv'' -ErrorAction SilentlyContinue'
      weight: 3

  - !powerShell:
      command: '$sr = [Environment]::GetEnvironmentVariable(''SystemRoot''); $tp = @([Environment]::GetEnvironmentVariable(''TEMP''), (Join-Path $sr ''Temp''), (Join-Path $sr ''Prefetch''), (Join-Path ([Environment]::GetFolderPath(''LocalApplicationData'')) ''Temp'')); $tc = 0; foreach ($p in $tp) { if (Test-Path $p) { $items = Get-ChildItem $p -Recurse -Force -ErrorAction SilentlyContinue; $sz = [math]::Round(($items | Measure-Object -Property Length -Sum -ErrorAction SilentlyContinue).Sum / 1MB, 1); Remove-Item (Join-Path $p ''*'') -Recurse -Force -ErrorAction SilentlyContinue; $tc += $sz } }; Write-Host (''[TUNEDPC] Cleared approximately {0} MB of temp files.'' -f $tc)'
      weight: 3

  - !powerShell:
      command: '$sr = [Environment]::GetEnvironmentVariable(''SystemRoot''); $dp = Join-Path $sr ''ServiceProfiles\NetworkService\AppData\Local\Microsoft\Windows\DeliveryOptimization\Cache''; if (Test-Path $dp) { Remove-Item (Join-Path $dp ''*'') -Recurse -Force -ErrorAction SilentlyContinue; Write-Host ''[TUNEDPC] Delivery Optimization cache cleared.'' }'
      weight: 2

  - !powerShell:
      command: 'Stop-Service -Name ''FontCache'' -Force -ErrorAction SilentlyContinue; $sr = [Environment]::GetEnvironmentVariable(''SystemRoot''); $fc = Join-Path $sr ''ServiceProfiles\LocalService\AppData\Local\FontCache''; if (Test-Path $fc) { Remove-Item (Join-Path $fc ''*'') -Force -ErrorAction SilentlyContinue }; Start-Service -Name ''FontCache'' -ErrorAction SilentlyContinue; Write-Host ''[TUNEDPC] Font cache cleared.'''
      weight: 1

  - !powerShell:
      command: '$la = [Environment]::GetFolderPath(''LocalApplicationData''); $ic = Join-Path $la ''Microsoft\Windows\Explorer''; if (Test-Path $ic) { Get-ChildItem (Join-Path $ic ''iconcache*.db'') -Force -ErrorAction SilentlyContinue | Remove-Item -Force -ErrorAction SilentlyContinue; Get-ChildItem (Join-Path $ic ''thumbcache*.db'') -Force -ErrorAction SilentlyContinue | Remove-Item -Force -ErrorAction SilentlyContinue; Write-Host ''[TUNEDPC] Icon and thumbnail cache cleared.'' }'
      weight: 1

  - !powerShell:
      command: '$cf = @(''Active Setup Temp Folders'',''BranchCache'',''Content Indexer Cleaner'',''D3D Shader Cache'',''Delivery Optimization Files'',''Device Driver Packages'',''Diagnostic Data Viewer database files'',''Downloaded Program Files'',''Internet Cache Files'',''Old ChkDsk Files'',''Previous Installations'',''Recycle Bin'',''RetailDemo Offline Content'',''Setup Log Files'',''System error memory dump files'',''System error minidump files'',''Temporary Files'',''Temporary Setup Files'',''Thumbnail Cache'',''Update Cleanup'',''Upgrade Discarded Files'',''User file versions'',''Windows Defender'',''Windows Error Reporting Files'',''Windows ESD installation files'',''Windows Reset Log Files'',''Windows Upgrade Log Files''); $vc = ''HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\VolumeCaches''; foreach ($f in $cf) { $p = Join-Path $vc $f; if (Test-Path $p) { Set-ItemProperty -Path $p -Name ''StateFlags0100'' -Value 2 -Type DWord -Force -ErrorAction SilentlyContinue } }; Start-Process ''cleanmgr.exe'' -ArgumentList ''/sagerun:100'' -Wait -ErrorAction SilentlyContinue; Write-Host ''[TUNEDPC] Disk Cleanup completed.'''
      weight: 5

  - !cmd:
      command: 'ipconfig /flushdns'
      wait: true
      weight: 1

  - !powerShell:
      command: 'Write-Host ''''; Write-Host ''============================================''; Write-Host ''  TUNEDPC Lightweight OS -- Complete!''; Write-Host ''============================================''; Write-Host ''''; Write-Host ''  All optimizations have been applied.''; Write-Host ''  Please REBOOT your PC for changes to take full effect.''; Write-Host ''''; Write-Host ''  For game-specific config optimization,''; Write-Host ''  download the TUNEDPC app at TUNEDPC.com''; Write-Host ''''; Write-Host ''============================================'''
      weight: 1
