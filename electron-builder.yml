appId: com.sensequality.optimizer
productName: SENSEQUALITY Optimizer
copyright: Copyright 2026 SENSEQUALITY

directories:
  output: release

files:
  - dist/**/*
  - dist-electron/**/*

extraResources:
  - from: scripts
    to: scripts
    filter:
      - "*.ps1"
      - "BO7BACKUP/**"
      - "!Gaming Research"
      - "!Gaming Research/**"
      - "!testimages"
      - "!testimages/**"
      - "!RUN_AS_ADMIN.bat"
      - "!00_MASTER_RUN_ALL.ps1"
  - from: resources/icon.png
    to: icon.png
  - from: resources/icon.ico
    to: icon.ico
  - from: EULA.txt
    to: EULA.txt
  - from: resources/tools
    to: tools
    filter:
      - "*.exe"
      - "*.nip"

win:
  target: nsis
  icon: resources/icon.ico
  requestedExecutionLevel: requireAdministrator

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: SENSEQUALITY Optimizer
  license: EULA.txt

publish:
  provider: github
  owner: Kirneill
  repo: TunedPCApp
